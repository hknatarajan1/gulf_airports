const B_LBL = { closed:'CLOSED', disrupted:'DISRUPTED', open:'OPEN' };
const B_NEWS_CACHE = {};
const B_NEWS_TTL   = 5 * 60 * 1000;
let   bFilter      = 'all';
let   openBorderId = null;

// ── Toggle panel ──
function toggleBorderPanel() {
  const panel  = document.getElementById('border-panel');
  const toggle = document.getElementById('border-toggle');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('active', !isOpen);
  if (!isOpen) {
    buildBorderList();
    document.getElementById('bfoot-ts').textContent = 'Updated ' + gulfShort();
  }
}

// ── Filter ──
function setBorderFilter(f, el) {
  bFilter = f;
  document.querySelectorAll('.bft').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  buildBorderList();
}

// ── Build list ──
function buildBorderList() {
  const el = document.getElementById('blist');
  el.innerHTML = '';
  const shown = bFilter === 'all' ? BORDERS : BORDERS.filter(b => b.s === bFilter);

  // Group by country
  const groups = {};
  shown.forEach(b => {
    if (!groups[b.country]) groups[b.country] = [];
    groups[b.country].push(b);
  });

  Object.entries(groups).forEach(([country, crossings]) => {
    const hdr = document.createElement('div');
    hdr.className = 'b-country';
    hdr.textContent = country;
    el.appendChild(hdr);

    crossings.forEach(b => {
      const c = b.s === 'closed' ? 'r' : b.s === 'disrupted' ? 'a' : 'g';
      const card = document.createElement('div');
      card.className = 'b-card'; card.id = 'bcard-' + b.id;
      card.innerHTML = `
        <div class="b-card-top">
          <div class="b-pip ${c}"></div>
          <div class="b-name">${b.name}</div>
          <div class="b-badge ${c}">${B_LBL[b.s]}</div>
        </div>
        <div class="b-route">${b.route}</div>
        <div class="b-note">${b.note}</div>
        <div class="b-detail" id="bdetail-${b.id}">
          <div class="b-detail-row"><span class="b-detail-k">Hours</span><span class="b-detail-v">${b.hours}</span></div>
          <div class="b-detail-row"><span class="b-detail-k">Vehicles</span><span class="b-detail-v">${b.types}</span></div>
          <div class="b-detail-row"><span class="b-detail-k">Status</span><span class="b-detail-v ${c}">${B_LBL[b.s]}</span></div>
          <div class="b-news" id="bnews-${b.id}">
            <div class="b-news-title">Latest updates</div>
            </div>
          </div>
        </div>`;
      card.addEventListener('click', () => toggleBorderCard(b));
      el.appendChild(card);
    });
  });
}

function toggleBorderCard(b) {
  const card = document.getElementById('bcard-' + b.id);
  const wasOpen = card.classList.contains('on');

  // Close all
  document.querySelectorAll('.b-card.on').forEach(c => c.classList.remove('on'));
  openBorderId = null;

  if (!wasOpen) {
    card.classList.add('on');
    openBorderId = b.id;
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    fetchBorderNews(b);
  }
}

// ── Live news for a border crossing ──
async function fetchBorderNews(b) {
  const newsEl = document.getElementById('bnews-' + b.id);
  if (!newsEl) return;

  const cached = B_NEWS_CACHE[b.id];
  if (cached && (Date.now() - cached.fetched) < B_NEWS_TTL) {
    newsEl.innerHTML = '<div class="b-news-title">Latest updates</div>' + cached.html;
    return;
  }

  newsEl.innerHTML = '<div class="b-news-title">Latest updates</div></div>';

  const today  = gulfDateStr();
  const prompt = `Today is ${today} (Gulf time). There is an active US-Israeli military conflict with Iran causing major disruptions across the Middle East.

Search for the very latest news about the ${b.name} border crossing between ${b.country} (route: ${b.route}). Focus on: current open/closed status, restrictions, queue times, security measures, any incidents, and traveller advice.

Return ONLY a JSON array (no markdown, no other text) of up to 4 news items, most recent first. Each item: {"text": "one sentence summary", "time": "date/time if known, else Recent", "dot": "r|a|g|b"} where r=closed/bad, a=caution/disrupted, g=open/good, b=neutral.

If no specific news found, return items summarising the general border situation between these two countries given the current crisis.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const textBlock = [...(data.content || [])].reverse().find(bl => bl.type === 'text');
    const raw = (textBlock?.text || '').trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const items = JSON.parse(raw);
    const html = (Array.isArray(items) ? items : []).map(n => `
      <div class="b-news-item">
        <div class="b-news-dot ${n.dot || 'b'}"></div>
        <div>
          <div class="b-news-text">${n.text}</div>
          <div class="b-news-meta">${n.time}</div>
        </div>
      </div>`).join('');
    B_NEWS_CACHE[b.id] = { html, fetched: Date.now() };
    if (newsEl) newsEl.innerHTML = '<div class="b-news-title">Latest updates</div>' + (html || '<div style="font-size:10px;color:var(--muted);padding:4px 0">No specific updates found.</div>');
  } catch(err) {
    // Fall back to static news
    const html = b.news.map(n => `
      <div class="b-news-item">
        <div class="b-news-dot ${n.dot}"></div>
        <div>
          <div class="b-news-text">${n.text}</div>
          <div class="b-news-meta">${n.time}</div>
        </div>
      </div>`).join('');
    if (newsEl) newsEl.innerHTML = '<div class="b-news-title">Latest updates <span style="font-size:8px;color:var(--amber);margin-left:4px">(cached)</span></div>' + html;
  }
}

// HELPERS
// ═══════════════════════════════════════════════════════════════════
const C  = {r:'var(--red)',  a:'var(--amber)',  g:'var(--green)'};
const CL = {closed:'r', disrupted:'a', open:'g'};
const LB = {closed:'CLOSED', disrupted:'DISRUPTED', open:'OPEN'};
const ST = {closed:'SUSPENDED', disrupted:'DISRUPTED', open:'OPERATIONAL'};

// ═══════════════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════════════
const map = L.map('map', { center:[27,52], zoom:5, zoomControl:false });
L.control.zoom({ position:'topright' }).addTo(map);

const cartoDark  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  { attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:20 });
const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:20 });
const osmStd     = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',             { attribution:'© OpenStreetMap contributors', maxZoom:19 });
const satellite  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 });
cartoDark.addTo(map);
// ── Theme toggle ──
function setTheme(t) {
  const isDark = (t === 'dark');

// LIVE NEWS via Anthropic API (web search)
// Cache per airport so repeated opens don't re-fetch within a session
// ═══════════════════════════════════════════════════════════════════
const NEWS_CACHE = {}; // id -> { html, fetched }
const NEWS_TTL   = 5 * 60 * 1000; // refresh cache after 5 minutes

function dotForSentiment(text) {
  const t = text.toLowerCase();
  if (/open|operational|normal|resume|clear|safe/.test(t)) return 'g';
  if (/suspend|clos|cancel|halt|ground|strike|attack|missile|drone|shut/.test(t)) return 'r';
  if (/delay|disrupt|reduce|caution|monitor|limit|restrict|divert/.test(t)) return 'a';
  return 'b';
}

function renderNewsItems(items) {
  if (!items || !items.length) return '<div style="padding:8px 0;font-size:11px;color:var(--muted)">No recent updates found.</div>';
  return items.map(n => `
    <div class="news-item">
      <div class="news-dot ${n.dot || dotForSentiment(n.text)}"></div>
      <div class="news-body">
        <div class="news-text">${n.text}</div>
        <div class="news-meta">${n.time}</div>
      </div>
    </div>`).join('');
}

async function fetchLiveNews(ap) {
  const newsEl = document.getElementById('news-' + ap.id);
  const footEl = document.getElementById('pfoot-' + ap.id);

  // Use cache if fresh
  const cached = NEWS_CACHE[ap.id];
  if (cached && (Date.now() - cached.fetched) < NEWS_TTL) {
    if (newsEl) newsEl.innerHTML = '<div class="pu-news-title">Latest updates</div>' + cached.html;
    if (footEl) footEl.textContent = 'Updated ' + gulfShort();
    return;
  }

  // Show spinner
  if (newsEl) newsEl.innerHTML = '<div class="pu-news-title">Latest updates</div></div>';

  const today   = gulfDateStr();
  const prompt  = `Today is ${today} (Gulf time). There is an active US-Israeli military conflict with Iran causing major aviation disruptions across the Middle East.

Search for the very latest news specifically about ${ap.name} (IATA: ${ap.id}) in ${ap.city}. Focus on: current airport status, airspace closures or reopenings, airline suspensions or resumptions, any incidents, and passenger advice.

Return ONLY a JSON array (no markdown, no other text) of up to 5 news items, most recent first. Each item: {"text": "one sentence summary", "time": "date and time if known, else 'Recent'", "dot": "r|a|g|b"} where r=bad/closed, a=caution/disrupted, g=good/open, b=neutral info.

If no specific news is found for this airport, return items summarising the general regional situation as it applies to ${ap.city}.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();

    // Extract the final text block (after any tool use)
    const textBlock = [...(data.content || [])].reverse().find(b => b.type === 'text');
    const raw = textBlock?.text?.trim() || '';

    // Parse JSON — strip any accidental markdown fences
    const jsonStr = raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const items = JSON.parse(jsonStr);

    const html = renderNewsItems(Array.isArray(items) ? items : []);
    NEWS_CACHE[ap.id] = { html, fetched: Date.now() };

    if (newsEl) newsEl.innerHTML = '<div class="pu-news-title">Latest updates</div>' + html;
    if (footEl) footEl.textContent = 'Updated ' + gulfShort();

  } catch (err) {
    console.warn('News fetch error for', ap.id, err);
    // Graceful fallback: show the static background news from the airport data
    const fallback = renderNewsItems(ap.news);
    if (newsEl) newsEl.innerHTML = '<div class="pu-news-title">Latest updates <span style="font-size:8px;color:var(--amber);font-weight:400;margin-left:6px;letter-spacing:0">(cached · live fetch unavailable)</span></div>' + fallback;
    if (footEl) footEl.textContent = 'Cached data · ' + gulfShort();
  }
}

let pins = [];

async function doPin() {
  const q = document.getElementById('linput').value.trim();
  if(!q) return;
  const btn=document.getElementById('pbtn'), msg=document.getElementById('lmsg');
  btn.disabled=true; btn.textContent='…';
  msg.textContent='Searching…'; msg.className='';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers:{'Accept-Language':'en','User-Agent':'GulfAviationMap/3.1'} });
    const data = await r.json();
    if(!data.length) throw new Error('Location not found — try a more specific address');
    const {lat,lon,display_name} = data[0];
    const ll = [parseFloat(lat),parseFloat(lon)];
    const label = q.length>32 ? q.slice(0,30)+'…' : q;
    const icon = L.divIcon({ className:'', html:`<div class="locdot"></div>`, iconSize:[13,13], iconAnchor:[6,6], popupAnchor:[0,-10] });
    const marker = L.marker(ll, {icon, zIndexOffset:2000})
      .bindPopup(`<div class="pu-hdr" style="background:rgba(59,130,246,.06)"><div class="pu-iata" style="color:var(--blue);font-size:20px">📍</div><div class="pu-name">${label}</div><div class="pu-city">${display_name.split(',').slice(0,3).join(', ')}</div></div><div class="pu-foot"><span>${parseFloat(lat).toFixed(5)}°N  ${parseFloat(lon).toFixed(5)}°E</span><span>Nominatim geocoder</span></div>`)
      .addTo(lgP);
    const id = Date.now();
    pins.push({id, label, ll, marker});
    renderPins();
    map.setView(ll, Math.max(map.getZoom(),11), {animate:true});
    setTimeout(()=>marker.openPopup(),380);
    msg.textContent='✓ Pinned: '+label; msg.className='ok';
    document.getElementById('linput').value='';
  } catch(e) {
    msg.textContent='✗ '+e.message; msg.className='er';
  } finally {
    btn.disabled=false; btn.textContent='Pin';
  }
}

function renderPins() {
  const el = document.getElementById('pinlist');
  el.innerHTML='';
  pins.forEach(p => {
    const row = document.createElement('div');
    row.className='pin-item';
    row.innerHTML=`<span class="pin-dot">📍</span><span class="pin-lbl" title="${p.label}">${p.label}</span><button class="pin-go" onclick="gotoPin(${p.id})">Go</button><button class="pin-del" title="Remove pin" onclick="delPin(${p.id})">✕</button>`;
    el.appendChild(row);
  });
}

function gotoPin(id) {
  const p=pins.find(x=>x.id===id);
  if(!p) return;
  map.setView(p.ll, Math.max(map.getZoom(),12), {animate:true});
  setTimeout(()=>p.marker.openPopup(),300);
}

function delPin(id) {
  const p=pins.find(x=>x.id===id);
  if(p) lgP.removeLayer(p.marker);
  pins=pins.filter(x=>x.id!==id);
  renderPins();
  const msg=document.getElementById('lmsg');
  msg.textContent='Pin removed.'; msg.className='';
  setTimeout(()=>{ if(msg.textContent==='Pin removed.') msg.textContent=''; },1800);
}

document.getElementById('linput').addEventListener('keydown', e=>{ if(e.key==='Enter') doPin(); });

// ═══════════════════════════════════════════════════════════════════
// CLOCK & TIME HELPERS  (Gulf Standard Time = UTC+4, no DST)
// ═══════════════════════════════════════════════════════════════════
function gulfNow() {
  // Returns a Date object whose UTC fields represent Gulf time (UTC+4)
  return new Date(Date.now() + 4 * 3600 * 1000);
}

function gulfTimeStr(d) {
  // HH:MM:SS in Gulf time
  const g = d || gulfNow();
  const hh = String(g.getUTCHours()).padStart(2,'0');
  const mm = String(g.getUTCMinutes()).padStart(2,'0');
  const ss = String(g.getUTCSeconds()).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

function gulfDateStr(d) {
  const g = d || gulfNow();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day  = String(g.getUTCDate()).padStart(2,'0');
  const mon  = months[g.getUTCMonth()];
  const yr   = g.getUTCFullYear();
  return `${day} ${mon} ${yr}`;
}

function gulfShort() {
  // e.g. "03 Mar · 14:22 GST"
  const g = gulfNow();
  return `${gulfDateStr(g)} · ${gulfTimeStr(g).slice(0,5)} GST`;
}

function tick() {
  const g = gulfNow();
  // Header clock
  document.getElementById('hts').textContent = gulfTimeStr(g) + ' GST';
  // Header date
  const dateEl = document.getElementById('hdate');
  if (dateEl) dateEl.textContent = gulfDateStr(g);
}

// Track which airport popup is currently open so we can refresh its news
let openPopupId = null;

// Wire up every marker to record which popup is open
function wirePopupTracking() {
  AP.forEach(ap => {
    const m = MKR[ap.id];
    if (!m) return;
    m.on('popupopen',  () => { openPopupId = ap.id; fetchLiveNews(ap); });
    m.on('popupclose', () => { if (openPopupId === ap.id) openPopupId = null; });
  });
}

function stampPopupFooter(id) {
  const el = document.getElementById('pfoot-' + id);
  if (el) el.textContent = 'Updated ' + gulfShort();
}

// Refresh the open popup's news — clears cache so a fresh API call is made
function refreshOpenPopup() {
  if (!openPopupId) return;
  const ap = AP.find(a => a.id === openPopupId);
  if (!ap) return;
  delete NEWS_CACHE[ap.id]; // force re-fetch
  fetchLiveNews(ap);
}

const SECS=60; let cd=SECS; let tmr;
function startTimer() {
  clearInterval(tmr); cd=SECS;
  tmr=setInterval(()=>{
    cd--;
    document.getElementById('pf').style.width = (cd/SECS*100)+'%';
    document.getElementById('pcd').textContent = cd+'s';
    if(cd<=0){ doRefresh(); cd=SECS; }
  },1000);
}
function doRefresh() {
  tick();
  refreshOpenPopup();
  const b=document.getElementById('rfbtn');
  b.classList.add('spin'); setTimeout(()=>b.classList.remove('spin'),700);
}
function manualRefresh() { doRefresh(); startTimer(); }
