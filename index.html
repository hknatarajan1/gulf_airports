<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gulf Aviation Crisis — Live</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>



:root {
  --red:#ef4444; --amber:#f59e0b; --green:#22c55e; --blue:#3b82f6;
  --bg:#08111f; --panel:rgba(8,14,28,0.97); --panel2:rgba(13,20,38,0.96);
  --border:rgba(255,255,255,0.07); --text:#dde6f0; --muted:#5a6a80; --muted2:#8096b0;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  --hdr: 50px; --sbar: 28px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); }

/* ── MAP fills everything ── */
#map { position: absolute; inset: 0; z-index: 1; }

/* ── LEAFLET OVERRIDES ── */
.leaflet-popup-content-wrapper {
  background: var(--panel) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  border-radius: 14px !important;
  box-shadow: 0 28px 80px rgba(0,0,0,0.85) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  padding: 0 !important;
  overflow: hidden !important;
}
.leaflet-popup-content { margin: 0 !important; width: 360px !important; }
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--muted) !important; font-size: 20px !important;
  right: 12px !important; top: 12px !important; z-index: 10 !important;
  line-height: 1 !important;
}
.leaflet-popup-close-button:hover { color: var(--text) !important; }
.leaflet-control-attribution { font-size: 9px !important; background: rgba(0,0,0,0.6) !important; color: #444 !important; }
.leaflet-control-attribution a { color: #666 !important; }
.leaflet-control-layers {
  background: var(--panel) !important; border: 1px solid var(--border) !important;
  border-radius: 10px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
}
.leaflet-control-layers-expanded { padding: 10px 14px !important; }
.leaflet-control-layers label {
  color: var(--text) !important; font-family: var(--font) !important;
  font-size: 12px !important; display: flex !important; align-items: center !important;
  gap: 8px !important; padding: 4px 0 !important;
}
.leaflet-control-layers-separator { border-top: 1px solid var(--border) !important; margin: 5px 0 !important; }
.leaflet-control-layers-selector { accent-color: var(--blue) !important; }
.leaflet-bar a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
.leaflet-bar a:hover { background: var(--panel2) !important; }

/* ── HEADER ── */
#hdr {
  position: absolute; top: 0; left: 0; right: 0; height: var(--hdr);
  background: rgba(6,10,22,0.97); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 1000; backdrop-filter: blur(16px);
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-logo { width: 28px; height: 28px; background: linear-gradient(135deg,#1e40af,#6d28d9); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.h-title { font-size: 13px; font-weight: 700; letter-spacing: -0.015em; }
.h-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.22);
  border-radius: 20px; padding: 3px 10px; font-size: 9px; font-weight: 700;
  letter-spacing: .12em; color: var(--red); text-transform: uppercase;
}
.ldot { width: 5px; height: 5px; background: var(--red); border-radius: 50%; animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.h-right { display: flex; align-items: center; gap: 8px; }
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 9px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: background .15s;
}
.stat-chip:hover { background: rgba(255,255,255,0.08); }
.sc-dot { width: 6px; height: 6px; border-radius: 50%; }
.sc-dot.r { background: var(--red);   box-shadow: 0 0 5px rgba(239,68,68,.5); }
.sc-dot.a { background: var(--amber); box-shadow: 0 0 5px rgba(245,158,11,.5); }
.sc-dot.g { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,.5); }
.sc-dot.r + span { color: var(--red); }
.sc-dot.a + span { color: var(--amber); }
.sc-dot.g + span { color: var(--green); }
#hts { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 70px; text-align: right; }

/* ── SIDEBAR ── */
#sb {
  position: absolute;
  top: var(--hdr); left: 0; bottom: var(--sbar);
  width: 280px;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 500;
  overflow: hidden;
}

/* Location section */
.loc-sec { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sec-label { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
.loc-row { display: flex; gap: 6px; margin-bottom: 5px; }
#linput {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 11px; font-family: var(--font); font-size: 12px;
  color: var(--text); outline: none; transition: border-color .2s;
}
#linput:focus { border-color: rgba(59,130,246,0.45); }
#linput::placeholder { color: var(--muted); }
#pbtn {
  background: var(--blue); border: none; border-radius: 7px;
  padding: 7px 12px; font-size: 11px; font-weight: 600; color: #fff;
  cursor: pointer; transition: background .15s; flex-shrink: 0;
}
#pbtn:hover { background: #2563eb; }
#pbtn:disabled { opacity: .5; cursor: default; }
#lmsg { font-size: 10px; color: var(--muted); min-height: 13px; }
#lmsg.ok { color: var(--green); } #lmsg.er { color: var(--red); }
#pinlist { display: flex; flex-direction: column; gap: 4px; margin-top: 7px; }
.pin-item {
  display: flex; align-items: center; gap: 7px;
  background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.14);
  border-radius: 7px; padding: 6px 9px;
}
.pin-dot { color: var(--blue); font-size: 12px; flex-shrink: 0; }
.pin-lbl { flex: 1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pin-go  { background: rgba(59,130,246,0.15); border: none; border-radius: 4px; padding: 2px 7px; font-size: 9px; font-weight: 600; color: var(--blue); cursor: pointer; flex-shrink: 0; }
.pin-go:hover { background: rgba(59,130,246,0.3); }
.pin-del { background: rgba(239,68,68,0.1); border: none; border-radius: 4px; width: 20px; height: 20px; font-size: 11px; color: var(--red); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .12s; }
.pin-del:hover { background: rgba(239,68,68,0.25); }

/* Filter tabs */
.filter-row { display: flex; gap: 4px; padding: 9px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ftab {
  flex: 1; padding: 5px 3px; border-radius: 6px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  cursor: pointer; text-align: center; transition: all .15s; color: var(--muted);
}
.ftab.on.all   { background: rgba(59,130,246,.1);  border-color: rgba(59,130,246,.3);  color: var(--blue); }
.ftab.on.r     { background: rgba(239,68,68,.1);   border-color: rgba(239,68,68,.3);   color: var(--red); }
.ftab.on.a     { background: rgba(245,158,11,.1);  border-color: rgba(245,158,11,.3);  color: var(--amber); }
.ftab.on.g     { background: rgba(34,197,94,.1);   border-color: rgba(34,197,94,.3);   color: var(--green); }

/* Airport scroll list */
#alist {
  flex: 1; overflow-y: auto; padding: 6px 8px;
}
#alist::-webkit-scrollbar { width: 3px; }
#alist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.ap-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px; cursor: pointer;
  border: 1px solid transparent; margin-bottom: 2px; transition: all .12s;
}
.ap-row:hover  { background: rgba(255,255,255,0.04); border-color: var(--border); }
.ap-row.on     { background: rgba(59,130,246,0.07);  border-color: rgba(59,130,246,0.2); }
.ap-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ap-pip.r { background: var(--red);   box-shadow: 0 0 6px rgba(239,68,68,.55); }
.ap-pip.a { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,.55); }
.ap-pip.g { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.55); }
.ap-iata { font-family: var(--mono); font-size: 11px; font-weight: 600; width: 32px; flex-shrink: 0; }
.ap-info { flex: 1; min-width: 0; }
.ap-name { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ap-city { font-size: 9px; color: var(--muted); margin-top: 1px; }
.ap-badge { font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: 700; letter-spacing: .05em; flex-shrink: 0; }
.ap-badge.r { background: rgba(239,68,68,.1);  color: var(--red); }
.ap-badge.a { background: rgba(245,158,11,.1); color: var(--amber); }
.ap-badge.g { background: rgba(34,197,94,.1);  color: var(--green); }

/* ── POPUP ── */
.pu-hdr { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
.pu-hdr.r { background: rgba(239,68,68,.05); }
.pu-hdr.a { background: rgba(245,158,11,.05); }
.pu-hdr.g { background: rgba(34,197,94,.05); }
.pu-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.pu-iata { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; }
.pu-iata.r { color: var(--red); }
.pu-iata.a { color: var(--amber); }
.pu-iata.g { color: var(--green); }
.pu-badge { font-size: 9px; padding: 3px 9px; border-radius: 5px; font-weight: 700; letter-spacing: .08em; align-self: flex-start; margin-top: 3px; }
.pu-badge.r { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.2); }
.pu-badge.a { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
.pu-badge.g { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.2); }
.pu-name { font-size: 13px; font-weight: 600; margin-top: 5px; }
.pu-city { font-size: 10px; color: var(--muted2); margin-top: 2px; }

/* Status grid */
.pu-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
.pu-cell { padding: 9px 14px; border-right: 1px solid var(--border); }
.pu-cell:nth-child(even) { border-right: none; }
.pu-cell:nth-child(n+3) { border-top: 1px solid var(--border); }
.pu-cell-k { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
.pu-cell-v { font-size: 11px; font-weight: 500; line-height: 1.3; }
.pu-cell-v.r { color: var(--red); }
.pu-cell-v.a { color: var(--amber); }
.pu-cell-v.g { color: var(--green); }

/* News section */
.pu-news { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.pu-news-title { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
.news-item { display: flex; gap: 9px; margin-bottom: 10px; }
.news-item:last-child { margin-bottom: 0; }
.news-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.news-dot.r { background: var(--red); }
.news-dot.a { background: var(--amber); }
.news-dot.g { background: var(--green); }
.news-dot.b { background: var(--blue); }
.news-body { flex: 1; }
.news-text { font-size: 11px; color: var(--text); line-height: 1.5; }
.news-meta { font-size: 9px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }


/* Links row */
.pu-links { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid var(--border); }
.pu-link {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 11px; font-size: 11px; font-weight: 500;
  color: var(--text); text-decoration: none; transition: all .15s; cursor: pointer;
}
.pu-link:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: #fff; }
.pu-link.primary { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--blue); }
.pu-link.primary:hover { background: rgba(59,130,246,0.25); }

/* Footer */
.pu-foot { padding: 7px 16px; display: flex; justify-content: space-between; font-size: 9px; color: rgba(90,106,128,.55); font-family: var(--mono); }

/* ── STATUS BAR ── */
#sbar {
  position: absolute; bottom: 0; left: 280px; right: 0; height: var(--sbar);
  background: rgba(5,8,18,.97); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; z-index: 500; font-size: 10px; color: var(--muted);
}
.prog-wrap { width: 80px; height: 2px; background: rgba(255,255,255,.06); border-radius: 1px; }
.prog-fill { height: 100%; background: var(--blue); border-radius: 1px; transition: width 1s linear; }
#rfbtn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  color: var(--muted); padding: 3px 10px; border-radius: 5px;
  font-family: var(--font); font-size: 9px; cursor: pointer; transition: all .15s;
}
#rfbtn:hover { background: rgba(255,255,255,.1); color: var(--text); }
#rfbtn.spin svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }


/* ── BORDER CROSSINGS TOGGLE BUTTON ── */
#border-toggle {
  position: absolute; top: 60px; right: 0; z-index: 600;
  background: var(--panel); border: 1px solid var(--border);
  border-right: none; border-radius: 8px 0 0 8px;
  padding: 10px 8px; cursor: pointer; writing-mode: vertical-rl;
  text-orientation: mixed; transform: rotate(180deg);
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  color: var(--muted2); text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  transition: all .2s; backdrop-filter: blur(12px);
}
#border-toggle:hover { color: var(--text); background: var(--panel2); }
#border-toggle.active { color: var(--amber); border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.07); }
.bt-icon { font-size: 14px; }

/* ── BORDER CROSSINGS PANEL ── */
#border-panel {
  position: absolute; top: var(--hdr); right: -340px; bottom: var(--sbar);
  width: 340px; z-index: 550;
  background: var(--panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter: blur(16px);
}
#border-panel.open { right: 0; }

.bp-head {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; background: rgba(0,0,0,.2);
}
.bp-title { font-size: 13px; font-weight: 700; }
.bp-sub   { font-size: 10px; color: var(--muted); margin-top: 2px; }
.bp-close {
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 6px; width: 26px; height: 26px; font-size: 14px;
  color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.bp-close:hover { background: rgba(255,255,255,.12); color: var(--text); }

/* Border filter tabs */
.bp-filters {
  display: flex; gap: 4px; padding: 9px 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.bft {
  flex: 1; padding: 5px 3px; border-radius: 6px;
  background: rgba(255,255,255,.03); border: 1px solid var(--border);
  font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  cursor: pointer; text-align: center; transition: all .15s; color: var(--muted);
}
.bft.on.all { background: rgba(59,130,246,.1);  border-color: rgba(59,130,246,.3);  color: var(--blue); }
.bft.on.r   { background: rgba(239,68,68,.1);   border-color: rgba(239,68,68,.3);   color: var(--red); }
.bft.on.a   { background: rgba(245,158,11,.1);  border-color: rgba(245,158,11,.3);  color: var(--amber); }
.bft.on.g   { background: rgba(34,197,94,.1);   border-color: rgba(34,197,94,.3);   color: var(--green); }

/* Border crossing list */
#blist { flex: 1; overflow-y: auto; padding: 6px 8px; }
#blist::-webkit-scrollbar { width: 3px; }
#blist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

/* Country group header */
.b-country {
  font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); padding: 10px 10px 5px; margin-top: 4px;
}
.b-country:first-child { margin-top: 0; }

/* Crossing card */
.b-card {
  border-radius: 8px; border: 1px solid transparent;
  padding: 9px 11px; margin-bottom: 3px; cursor: pointer;
  transition: all .15s;
}
.b-card:hover  { background: rgba(255,255,255,.04); border-color: var(--border); }
.b-card.on     { background: rgba(59,130,246,.07);  border-color: rgba(59,130,246,.2); }
.b-card-top    { display: flex; align-items: flex-start; gap: 8px; }
.b-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.b-pip.r { background: var(--red);   box-shadow: 0 0 6px rgba(239,68,68,.55); }
.b-pip.a { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,.55); }
.b-pip.g { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.55); }
.b-name { flex: 1; font-size: 11px; font-weight: 600; line-height: 1.3; }
.b-badge { font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
.b-badge.r { background: rgba(239,68,68,.1);  color: var(--red); }
.b-badge.a { background: rgba(245,158,11,.1); color: var(--amber); }
.b-badge.g { background: rgba(34,197,94,.1);  color: var(--green); }
.b-route { font-size: 10px; color: var(--muted2); margin-top: 2px; margin-left: 16px; }
.b-note  { font-size: 10px; color: var(--muted);  margin-top: 4px; margin-left: 16px; line-height: 1.5; }

/* Expanded detail within a card */
.b-detail {
  margin-top: 10px; margin-left: 16px;
  border-top: 1px solid var(--border); padding-top: 10px;
  display: none;
}
.b-card.on .b-detail { display: block; }
.b-detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 10px; }
.b-detail-k   { color: var(--muted); flex-shrink: 0; min-width: 72px; }
.b-detail-v   { color: var(--text); line-height: 1.4; }
.b-detail-v.r { color: var(--red); }
.b-detail-v.a { color: var(--amber); }
.b-detail-v.g { color: var(--green); }

/* Border news */
.b-news { margin-top: 8px; }
.b-news-title { font-size: 8px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.b-news-item  { display: flex; gap: 7px; margin-bottom: 7px; }
.b-news-dot   { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.b-news-dot.r { background: var(--red); }
.b-news-dot.a { background: var(--amber); }
.b-news-dot.g { background: var(--green); }
.b-news-dot.b { background: var(--blue); }
.b-news-text  { flex: 1; font-size: 10px; color: var(--text); line-height: 1.5; }
.b-news-meta  { font-size: 8px; color: var(--muted); margin-top: 1px; font-family: var(--mono); }
.b-news-loading { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 10px; padding: 4px 0; }

/* Border panel footer */
.bp-foot {
  padding: 8px 16px; font-size: 9px; color: rgba(90,106,128,.45);
  font-family: var(--mono); border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; flex-shrink: 0;
}


/* ── BORDER TOGGLE BUTTON ── */
#border-toggle {

}

}

  </div>
</div>

<div id="map"></div>

    </div>
    <div id="lmsg"></div>
    <div id="pinlist"></div>
  </div>

    <div class="ftab a"      onclick="setFilter('disrupted',this)">Disrupted</div>
    <div class="ftab g"      onclick="setFilter('open',  this)">Open</div>

  <div id="alist"></div>

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
const C  = {r:'var(--red)',  a:'var(--amber)',  g:'var(--green)'};
const CL = {closed:'r', disrupted:'a', open:'g'};
const LB = {closed:'CLOSED', disrupted:'DISRUPTED', open:'OPEN'};
const ST = {closed:'SUSPENDED', disrupted:'DISRUPTED', open:'OPERATIONAL'};

// ═══════════════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════════════
const map = L.map('map', { center:[28,50], zoom:5, zoomControl:false });
L.control.zoom({ position:'topright' }).addTo(map);

const cartoDark  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  { attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:20 });
const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:20 });
const osmStd     = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',             { attribution:'© OpenStreetMap contributors', maxZoom:19 });
const satellite  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 });
cartoDark.addTo(map);

const lgC = L.layerGroup().addTo(map);
const lgD = L.layerGroup().addTo(map);
const lgO = L.layerGroup().addTo(map);
const lgP = L.layerGroup().addTo(map);

L.control.layers(
  { '🌑 Dark (CartoDB)': cartoDark, '☀️ Light (CartoDB)': cartoLight, '🗺️ Street (OSM)': osmStd, '🛰️ Satellite (Esri)': satellite },
  { '🔴 Closed': lgC, '🟡 Disrupted': lgD, '🟢 Open': lgO, '📍 My locations': lgP },
  { position:'topright', collapsed:false }
).addTo(map);

// ═══════════════════════════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════════════════════════
const MKR = {};

function mkIcon(ap) {
  const c = CL[ap.s];
  return L.divIcon({
    className: '',
    html: `<div class="mi"><div class="mc ${c}">✈</div><div class="ml">${ap.id}</div></div>`,
    iconSize: [40,36], iconAnchor:[20,10], popupAnchor:[0,-8]
  });
}

function buildMarkers() {
  lgC.clearLayers(); lgD.clearLayers(); lgO.clearLayers();
  AP.forEach(ap => {
    const m = L.marker([ap.lat,ap.lon], { icon:mkIcon(ap) });
    m.bindPopup(makePopup(ap), { maxWidth:400, minWidth:360, autoPan:true });
    m.on('click', () => hilite(ap.id));
    const lg = ap.s==='closed'?lgC : ap.s==='disrupted'?lgD : lgO;
    lg.addLayer(m);
    MKR[ap.id] = m;
  });
}

// ═══════════════════════════════════════════════════════════════════
// POPUP
// ═══════════════════════════════════════════════════════════════════
function makePopup(ap) {
  const c  = CL[ap.s];
  const sc = c==='r'?'r' : c==='a'?'a' : 'g';
  const d  = ap.detail;

  const linksHtml = ap.links.map((l,i) => `
    <a class="pu-link${i===0?' primary':''}" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
  ).join('');

  return `
    <div class="pu-hdr ${c}">
      <div class="pu-top">
        <div>
          <div class="pu-iata ${c}">${ap.id}</div>
          <div class="pu-name">${ap.name}</div>
          <div class="pu-city">${ap.city}</div>
        </div>
        <div class="pu-badge ${c}">${ST[ap.s]}</div>
      </div>
    </div>

    <div class="pu-grid">
      <div class="pu-cell">
        <div class="pu-cell-k">Airspace</div>
        <div class="pu-cell-v">${d.airspace}</div>
      </div>
      <div class="pu-cell">
        <div class="pu-cell-k">Operations</div>
        <div class="pu-cell-v ${sc}">${d.ops}</div>
      </div>
      <div class="pu-cell">
        <div class="pu-cell-k">Carriers</div>
        <div class="pu-cell-v">${d.carrier_status}</div>
      </div>
      <div class="pu-cell">
        <div class="pu-cell-k">Last flight</div>
        <div class="pu-cell-v">${d.last_flight}</div>
      </div>
    </div>



    <div class="pu-links">
      ${linksHtml}
      <a class="pu-link" href="https://www.flightradar24.com/" target="_blank" rel="noopener">🗺 Flightradar24 live</a>
    </div>

    <div class="pu-foot">
      <span>${ap.lat.toFixed(3)}°N  ${ap.lon.toFixed(3)}°E</span>
      <span id="pfoot-${ap.id}">Updated —</span>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR LIST
// ═══════════════════════════════════════════════════════════════════
let curFilter = 'all';

function buildList(filter='all') {
  curFilter = filter;
  const el = document.getElementById('alist');
  el.innerHTML = '';
  const shown = filter==='all' ? AP : AP.filter(a => a.s===filter);
  shown.forEach(ap => {
    const c = CL[ap.s];
    const row = document.createElement('div');
    row.className = 'ap-row'; row.id = 'row-'+ap.id;
    row.innerHTML = `
      <div class="ap-pip ${c}"></div>
      <div class="ap-iata">${ap.id}</div>
      <div class="ap-info">
        <div class="ap-name">${ap.name}</div>
        <div class="ap-city">${ap.city}</div>
      </div>
      <div class="ap-badge ${c}">${LB[ap.s]}</div>`;
    row.addEventListener('click', () => {
      const m = MKR[ap.id];
      if(m) { map.setView([ap.lat,ap.lon], Math.max(map.getZoom(),8), {animate:true}); setTimeout(()=>m.openPopup(),280); }
      hilite(ap.id);
    });
    el.appendChild(row);
  });
}

function hilite(id) {
  document.querySelectorAll('.ap-row').forEach(r => r.classList.remove('on'));
  const r = document.getElementById('row-'+id);
  if(r) { r.classList.add('on'); r.scrollIntoView({block:'nearest',behavior:'smooth'}); }
}

function setFilter(f, el) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  if(el) el.classList.add('on');
  else {
    // called from header chip — find correct tab
    const map2 = {closed:'.ftab.r',disrupted:'.ftab.a',open:'.ftab.g'};
    const t = document.querySelector(map2[f]);
    if(t) t.classList.add('on');
  }
  buildList(f);
}

function updateStats() {
  document.getElementById('cc').textContent = AP.filter(a=>a.s==='closed').length    + ' Closed';
  document.getElementById('cd').textContent = AP.filter(a=>a.s==='disrupted').length + ' Disrupted';
  document.getElementById('co').textContent = AP.filter(a=>a.s==='open').length      + ' Open';
}

// ═══════════════════════════════════════════════════════════════════
// LOCATION PINS
// ═══════════════════════════════════════════════════════════════════
let pins = [];

async function doPin() {
  const q = document.getElementById('linput').value.trim();
  if(!q) return;
  const btn=document.getElementById('pbtn'), msg=document.getElementById('lmsg');
  btn.disabled=true; btn.textContent='…';
  msg.textContent='Searching…'; msg.className='';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers:{'Accept-Language':'en','User-Agent':'GulfAviationMap/3.1'} });
    const data = await r.json();
    if(!data.length) throw new Error('Location not found — try a more specific address');
    const {lat,lon,display_name} = data[0];
    const ll = [parseFloat(lat),parseFloat(lon)];
    const label = q.length>32 ? q.slice(0,30)+'…' : q;
    const icon = L.divIcon({ className:'', html:`<div class="locdot"></div>`, iconSize:[13,13], iconAnchor:[6,6], popupAnchor:[0,-10] });
    const marker = L.marker(ll, {icon, zIndexOffset:2000})
      .bindPopup(`<div class="pu-hdr" style="background:rgba(59,130,246,.06)"><div class="pu-iata" style="color:var(--blue);font-size:20px">📍</div><div class="pu-name">${label}</div><div class="pu-city">${display_name.split(',').slice(0,3).join(', ')}</div></div><div class="pu-foot"><span>${parseFloat(lat).toFixed(5)}°N  ${parseFloat(lon).toFixed(5)}°E</span><span>Nominatim geocoder</span></div>`)
      .addTo(lgP);
    const id = Date.now();
    pins.push({id, label, ll, marker});
    renderPins();
    map.setView(ll, Math.max(map.getZoom(),11), {animate:true});
    setTimeout(()=>marker.openPopup(),380);
    msg.textContent='✓ Pinned: '+label; msg.className='ok';
    document.getElementById('linput').value='';
  } catch(e) {
    msg.textContent='✗ '+e.message; msg.className='er';
  } finally {
    btn.disabled=false; btn.textContent='Pin';
  }
}

function renderPins() {
  const el = document.getElementById('pinlist');
  el.innerHTML='';
  pins.forEach(p => {
    const row = document.createElement('div');
    row.className='pin-item';
    row.innerHTML=`<span class="pin-dot">📍</span><span class="pin-lbl" title="${p.label}">${p.label}</span><button class="pin-go" onclick="gotoPin(${p.id})">Go</button><button class="pin-del" title="Remove pin" onclick="delPin(${p.id})">✕</button>`;
    el.appendChild(row);
  });
}

function gotoPin(id) {
  const p=pins.find(x=>x.id===id);
  if(!p) return;
  map.setView(p.ll, Math.max(map.getZoom(),12), {animate:true});
  setTimeout(()=>p.marker.openPopup(),300);
}

function delPin(id) {
  const p=pins.find(x=>x.id===id);
  if(p) lgP.removeLayer(p.marker);
  pins=pins.filter(x=>x.id!==id);
  renderPins();
  const msg=document.getElementById('lmsg');
  msg.textContent='Pin removed.'; msg.className='';
  setTimeout(()=>{ if(msg.textContent==='Pin removed.') msg.textContent=''; },1800);
}

document.getElementById('linput').addEventListener('keydown', e=>{ if(e.key==='Enter') doPin(); });

// ═══════════════════════════════════════════════════════════════════
// CLOCK & TIME HELPERS  (Gulf Standard Time = UTC+4, no DST)
// ═══════════════════════════════════════════════════════════════════
function gulfNow() {
  // Returns a Date object whose UTC fields represent Gulf time (UTC+4)
  return new Date(Date.now() + 4 * 3600 * 1000);
}

function gulfTimeStr(d) {
  // HH:MM:SS in Gulf time
  const g = d || gulfNow();
  const hh = String(g.getUTCHours()).padStart(2,'0');
  const mm = String(g.getUTCMinutes()).padStart(2,'0');
  const ss = String(g.getUTCSeconds()).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

function gulfDateStr(d) {
  const g = d || gulfNow();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day  = String(g.getUTCDate()).padStart(2,'0');
  const mon  = months[g.getUTCMonth()];
  const yr   = g.getUTCFullYear();
  return `${day} ${mon} ${yr}`;
}

function gulfShort() {
  // e.g. "03 Mar · 14:22 GST"
  const g = gulfNow();
  return `${gulfDateStr(g)} · ${gulfTimeStr(g).slice(0,5)} GST`;
}

function tick() {
  const g = gulfNow();
  // Header clock
  document.getElementById('hts').textContent = gulfTimeStr(g) + ' GST';
  // Header date
  const dateEl = document.getElementById('hdate');
  if (dateEl) dateEl.textContent = gulfDateStr(g);
}


const SECS=60; let cd=SECS; let tmr;
function startTimer() {
  clearInterval(tmr); cd=SECS;
  tmr=setInterval(()=>{
    cd--;
    document.getElementById('pf').style.width = (cd/SECS*100)+'%';
    document.getElementById('pcd').textContent = cd+'s';
    if(cd<=0){ doRefresh(); cd=SECS; }
  },1000);
}
function doRefresh() {
  tick();
  const b=document.getElementById('rfbtn');
  b.classList.add('spin'); setTimeout(()=>b.classList.remove('spin'),700);
}
function manualRefresh() { doRefresh(); startTimer(); }

const B_LBL = { closed:'CLOSED', disrupted:'DISRUPTED', open:'OPEN' };
let bFilter = 'all';
let openBorderId = null;

function toggleBorderPanel() {
  var panel  = document.getElementById('border-panel');
  var toggle = document.getElementById('border-toggle');
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('active', !isOpen);
  if (!isOpen) {
    buildBorderList(bFilter);
    var ft = document.getElementById('bp-foot');
    if (ft) ft.textContent = 'Updated ' + gulfShort();
  }
}

function setBorderFilter(f, el) {
  bFilter = f;
  document.querySelectorAll('.bft').forEach(function(t) { t.classList.remove('on'); });
  el.classList.add('on');
  buildBorderList(f);
}

function buildBorderList(filter) {
  var el = document.getElementById('blist');
  if (!el) return;
  el.innerHTML = '';
  var shown = filter === 'all' ? BORDERS : BORDERS.filter(function(b) { return b.s === filter; });
  if (!shown.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:var(--muted)">No crossings match this filter.</div>';
    return;
  }
  var groups = {};
  shown.forEach(function(b) {
    if (!groups[b.country]) groups[b.country] = [];
    groups[b.country].push(b);
  });
  Object.keys(groups).forEach(function(country) {
    var hdr = document.createElement('div');
    hdr.className = 'b-country-hdr';
    hdr.textContent = country;
    el.appendChild(hdr);
    groups[country].forEach(function(b) {
      var c = b.s === 'closed' ? 'r' : b.s === 'disrupted' ? 'a' : 'g';
      var newsHtml = b.news.map(function(n) {
        return '<div class="b-ni"><div class="b-ndot ' + n.dot + '"></div>' +
               '<div><div class="b-ntext">' + n.text + '</div>' +
               '<div class="b-nmeta">' + n.time + '</div></div></div>';
      }).join('');
      var card = document.createElement('div');
      card.className = 'b-card';
      card.id = 'bcard-' + b.id;
      card.innerHTML =
        '<div class="b-top"><div class="b-pip ' + c + '"></div>' +
        '<div class="b-name">' + b.name + '</div>' +
        '<div class="b-badge ' + c + '">' + B_LBL[b.s] + '</div></div>' +
        '<div class="b-route">' + b.route + '</div>' +
        '<div class="b-note">' + b.note + '</div>' +
        '<div class="b-detail">' +
          '<div class="b-drow"><span class="b-dk">Hours</span><span class="b-dv">' + b.hours + '</span></div>' +
          '<div class="b-drow"><span class="b-dk">Vehicles</span><span class="b-dv">' + b.types + '</span></div>' +
          '<div class="b-drow"><span class="b-dk">Status</span><span class="b-dv ' + c + '">' + B_LBL[b.s] + '</span></div>' +
          '<div class="b-news-hdr">Updates</div>' + newsHtml +
        '</div>';
      card.addEventListener('click', function() {
        var already = card.classList.contains('open');
        document.querySelectorAll('.b-card.open').forEach(function(x) { x.classList.remove('open'); });
        if (!already) {
          card.classList.add('open');
          openBorderId = b.id;
          card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } else {
          openBorderId = null;
        }
      });
      el.appendChild(card);
    });
  });
}
